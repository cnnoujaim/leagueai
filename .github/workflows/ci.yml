name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Typecheck + tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm install --include=dev

      - name: Typecheck server
        run: npm run typecheck -w packages/server

      - name: Run server tests
        run: npm test -w packages/server

  smoke:
    name: Production smoke test
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Wait for Railway deploy
        run: sleep 90

      - name: Health check
        run: |
          for i in {1..10}; do
            if curl -fs https://leagueai-server-production.up.railway.app/health; then
              echo "Health OK"
              exit 0
            fi
            echo "Attempt $i failed, retrying in 15s..."
            sleep 15
          done
          echo "Health check failed after 10 attempts"
          exit 1

      - name: Meta endpoint check
        run: |
          response=$(curl -fs https://leagueai-server-production.up.railway.app/api/meta)
          patch=$(echo "$response" | jq -r '.patch')
          champ_count=$(echo "$response" | jq -r '.champions | length')
          echo "patch=$patch champions=$champ_count"
          if [ -z "$patch" ] || [ "$patch" = "null" ]; then
            echo "Meta missing patch field"
            exit 1
          fi
          if [ "$champ_count" -lt 100 ]; then
            echo "Meta has suspiciously few champions ($champ_count)"
            exit 1
          fi

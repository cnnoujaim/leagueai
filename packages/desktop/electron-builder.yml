appId: com.leagueai.desktop
productName: LeagueAI
copyright: Copyright 2026 LeagueAI
electronVersion: "32.3.3"

directories:
  output: release
  buildResources: resources

files:
  - out/**/*
  - "!node_modules/**/*"

extraResources:
  - from: resources/icons/
    to: icons/

mac:
  target:
    - target: dmg
      arch:
        - arm64
        - x64
  icon: resources/icons/icon.png
  category: public.app-category.games
  darkModeSupport: true

dmg:
  title: LeagueAI
  artifactName: LeagueAI-${version}-mac-${arch}.dmg

win:
  target:
    - target: nsis
      arch:
        - x64
  icon: resources/icons/icon.png

nsis:
  oneClick: true
  perMachine: false
  artifactName: LeagueAI-${version}-win-setup.exe

linux:
  target:
    - target: AppImage
      arch:
        - x64
  icon: resources/icons/icon.png
